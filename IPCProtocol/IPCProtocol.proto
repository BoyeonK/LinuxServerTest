syntax = "proto3";

package IPC_Protocol;

// M2H H2D D2M 출발지2도착지
// M : 메인프로세스, H : HTTP서버, D : 데디케이트프로세스

message M2HWelcome {
    int32 echo_message = 1;
}

message H2MWelcome {
    int32 echo_message = 1;
}

message H2MMatchMake {
    string ticket_redis_key = 1;
}

message H2MMatchMakeCancel {
    string ticket_redis_key = 1;
}

message D2MInitComplete {
    int32 pid = 1;
}